<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Invoice PDF Analyzer</title>

  <style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    color: #0f172a;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  .app {
    width: 100%;
    max-width: 1920px;
    margin: 0 auto;
    padding: 10px 14px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  h1 {
    margin: 0;
    font-size: 24px;
    line-height: 1.15;
  }

  .subtitle {
    margin-top: 3px;
    color: #64748b;
    font-size: 13px;
  }

  .button-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  button {
    border: 0;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    background: #2563eb;
    color: white;
  }

  button.secondary {
    background: #0f172a;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(4, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 8px;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 11px 14px;
    box-shadow: 0 6px 18px rgba(15, 23, 42, 0.07);
  }

  .card-title {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 5px;
  }

  .card-value {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.1;
  }

  .filter {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr;
    gap: 7px;
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    height: 38px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    padding: 0 10px;
    font-size: 14px;
    background: white;
  }

  .status {
    margin: 6px 0 8px;
    color: #475569;
    font-size: 13px;
  }

  .table-wrap {
    background: white;
    border-radius: 14px;
    overflow: auto;
    box-shadow: 0 6px 18px rgba(15, 23, 42, 0.07);
    max-height: calc(100vh - 245px);
  }

 table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  min-width: 1280px;
}

  th, td {
    padding: 8px 7px;
    border-bottom: 1px solid #e2e8f0;
    font-size: 12px;
    text-align: left;
    vertical-align: middle;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  th {
    position: sticky;
    top: 0;
    background: #f8fafc;
    z-index: 2;
    font-size: 11px;
    color: #475569;
  }

  tr:hover td {
    background: #f8fafc;
  }

  .col-received { width: 88px; }
  .col-label { width: 125px; }
  .col-vendor { width: 165px; }
  .col-invoice { width: 120px; }
.col-date { width: 105px; }
.col-due-date { width: 105px; }
.col-aircraft { width: 80px; }
  .col-airport { width: 95px; }
  .col-category { width: 95px; }
  .col-amount { width: 105px; }
  .col-pdf { width: 190px; }
  .col-gmail { width: 65px; }
  .col-status { width: 75px; }

  .amount {
    text-align: right;
    font-weight: 800;
  }

  .negative {
    color: #dc2626;
  }

  .positive {
    color: #0f766e;
  }

  .status-ok {
    color: #0f766e;
    font-weight: 800;
  }

  .status-error {
    color: #dc2626;
    font-weight: 800;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    background: #e2e8f0;
  }

  .badge.wfs {
    background: #dcfce7;
    color: #166534;
  }

  .badge.uas {
    background: #dbeafe;
    color: #1e40af;
  }

  .badge.review {
    background: #fee2e2;
    color: #991b1b;
  }

  a {
    color: #2563eb;
    font-weight: 700;
    text-decoration: none;
  }

  @media (max-width: 900px) {
    .app {
      padding: 10px;
    }

    .cards {
      grid-template-columns: repeat(2, 1fr);
    }

    .filter {
      grid-template-columns: 1fr;
    }

    h1 {
      font-size: 20px;
    }

    .table-wrap {
      max-height: calc(100vh - 300px);
    }

    table {
      min-width: 1050px;
    }
  }
</style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div>
        <h1>Invoice PDF Analyzer</h1>
        <div class="subtitle">Gmail Label → PDF 분석 → Invoice 목록 표출</div>
      </div>

      <div class="button-row">
        <button onclick="loadInvoices()">새로고침</button>
        <button class="secondary" onclick="scanInvoices()">Gmail PDF 분석 실행</button>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-title">Total Invoices</div>
        <div class="card-value" id="totalCount">0</div>
      </div>
      <div class="card">
        <div class="card-title">Total Amount</div>
        <div class="card-value" id="totalAmount">0</div>
      </div>
      <div class="card">
        <div class="card-title">Credit Count</div>
        <div class="card-value" id="creditCount">0</div>
      </div>
      <div class="card">
        <div class="card-title">Needs Review</div>
        <div class="card-value" id="reviewCount">0</div>
      </div>
    </div>

    <div class="filter">
      <input id="searchInput" placeholder="검색: Invoice No / Aircraft / Vendor / Subject" oninput="renderTable()" />

      <select id="labelFilter" onchange="renderTable()">
        <option value="">전체 라벨</option>
      </select>

      <select id="typeFilter" onchange="renderTable()">
        <option value="">전체 Type</option>
        <option value="Invoice">Invoice</option>
        <option value="Credit Invoice">Credit Invoice</option>
      </select>

      <select id="statusFilter" onchange="renderTable()">
        <option value="">전체 Status</option>
        <option value="OK">OK</option>
        <option value="ERROR">ERROR</option>
      </select>
    </div>

    <div class="status" id="status">대기 중</div>

    <div class="table-wrap">
      <table>
<thead>
  <tr>
    <th class="col-received">Received</th>
    <th class="col-label">Label</th>
    <th class="col-vendor">Vendor</th>
<th class="col-invoice">Invoice No</th>
<th class="col-date">Date</th>
<th class="col-due-date">Due Date</th>
<th class="col-aircraft">Aircraft</th>
    <th class="col-airport">Airport</th>
    <th class="col-category">Category</th>
    <th class="col-amount">Amount</th>
    <th class="col-pdf">PDF</th>
    <th class="col-gmail">Gmail</th>
    <th class="col-status">Status</th>
  </tr>
</thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKzaEGWGU31lVPX9lf7ZwybC-QNUrxkuE55t4TPixNVFjSnXyunw1UJpswrmzVKFof8A/exec";
    const API_TOKEN = "sk_invoice_2026_9xKp73Qw_invoice_check";

    let invoices = [];

    async function callApi(action) {
      const url =
        APPS_SCRIPT_URL +
        "?token=" + encodeURIComponent(API_TOKEN) +
        "&action=" + encodeURIComponent(action || "list") +
        "&t=" + Date.now();

      const res = await fetch(url);
      const data = await res.json();

      if (!data.ok) {
        throw new Error(data.error || "Apps Script error");
      }

      return data;
    }

    async function loadInvoices() {
      setStatus("Invoice 목록 불러오는 중...");

      try {
        const data = await callApi("list");
        invoices = data.invoices || [];

        updateFilters();
        renderTable();

        setStatus("불러오기 완료: " + invoices.length + "건");

      } catch (err) {
        console.error(err);
        setStatus("오류: " + err.message);
      }
    }

    async function scanInvoices() {
      const ok = confirm("Gmail 라벨의 PDF 첨부파일을 분석할까요?");
      if (!ok) return;

      setStatus("Gmail PDF 분석 중... 시간이 걸릴 수 있습니다.");

      try {
        const data = await callApi("scan");
        const r = data.result || {};

        setStatus(
          "분석 완료 / PDF: " + (r.totalPdf || 0) +
          " / 처리: " + (r.totalProcessed || 0) +
          " / 오류: " + (r.totalError || 0)
        );

        await loadInvoices();

      } catch (err) {
        console.error(err);
        setStatus("오류: " + err.message);
      }
    }

    function updateFilters() {
      const labelSet = new Set();

      invoices.forEach(x => {
        if (x.SourceLabel) labelSet.add(x.SourceLabel);
      });

      const labelFilter = document.getElementById("labelFilter");
      const current = labelFilter.value;

      labelFilter.innerHTML = '<option value="">전체 라벨</option>';

      Array.from(labelSet).sort().forEach(label => {
        const opt = document.createElement("option");
        opt.value = label;
        opt.textContent = label;
        labelFilter.appendChild(opt);
      });

      labelFilter.value = current;
    }

    function renderTable() {
      const tbody = document.getElementById("tbody");

      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
      const label = document.getElementById("labelFilter").value;
      const type = document.getElementById("typeFilter").value;
      const status = document.getElementById("statusFilter").value;

      let rows = invoices.slice();

      rows = rows.filter(x => {
        if (label && x.SourceLabel !== label) return false;
        if (type && x.InvoiceType !== type) return false;
        if (status && x.Status !== status) return false;

        if (keyword) {
          const blob = [
            x.Vendor,
            x.InvoiceNo,
            x.Registry,
            x.TripNo,
            x.Subject,
            x.Category,
            x.Airport,
            x.FileName
          ].join(" ").toLowerCase();

          if (!blob.includes(keyword)) return false;
        }

        return true;
      });

      updateSummary(rows);

tbody.innerHTML = rows.map(x => {
  const amount = Number(x.Amount || 0);
  const amountClass = amount < 0 ? "negative" : "positive";

  const gmailLink = x.GmailUrl
    ? '<a href="' + escapeHtml(x.GmailUrl) + '" target="_blank">Open</a>'
    : "";

  const categoryClass =
    String(x.Category || "").toUpperCase().includes("WFS") ? "wfs" :
    String(x.Category || "").toUpperCase().includes("UAS") ? "uas" :
    String(x.Category || "").toUpperCase().includes("REVIEW") ? "review" :
    "";

  const statusClass =
    x.Status === "OK" ? "status-ok" :
    x.Status === "ERROR" ? "status-error" :
    "";

  return `
    <tr title="Type: ${escapeHtml(x.InvoiceType || "")} / Trip: ${escapeHtml(x.TripNo || "")} / Currency: ${escapeHtml(x.Currency || "")} / Items: ${escapeHtml(x.ItemCount || "")}">
      <td class="col-received" title="${escapeHtml(formatDate(x.ReceivedAt))}">
        ${formatDate(x.ReceivedAt)}
      </td>

      <td class="col-label" title="${escapeHtml(x.SourceLabel || "")}">
        ${escapeHtml(x.SourceLabel || "")}
      </td>

      <td class="col-vendor" title="${escapeHtml(x.Vendor || "")}">
        ${escapeHtml(x.Vendor || "")}
      </td>

      <td class="col-invoice" title="${escapeHtml(x.InvoiceNo || "")}">
        <b>${escapeHtml(x.InvoiceNo || "")}</b>
      </td>

 <td class="col-date" title="${escapeHtml(x.InvoiceDate || "")}">
  ${escapeHtml(x.InvoiceDate || "")}
</td>

<td class="col-due-date" title="${escapeHtml(x.DueDate || "")}">
  ${escapeHtml(x.DueDate || "")}
</td>

<td class="col-aircraft" title="${escapeHtml(x.Registry || "")}">
  <b>${escapeHtml(x.Registry || "")}</b>
</td>

      <td class="col-airport" title="${escapeHtml(x.Airport || "")}">
        ${escapeHtml(x.Airport || "")}
      </td>

      <td class="col-category" title="${escapeHtml(x.Category || "")}">
        <span class="badge ${categoryClass}">${escapeHtml(x.Category || "")}</span>
      </td>

      <td class="col-amount amount ${amountClass}" title="${formatAmount(amount)}">
        ${formatAmount(amount)}
      </td>

      <td class="col-pdf" title="${escapeHtml(x.FileName || "")}">
        ${escapeHtml(x.FileName || "")}
      </td>

      <td class="col-gmail">
        ${gmailLink}
      </td>

      <td class="col-status ${statusClass}" title="${escapeHtml(x.Status || "")}">
        ${escapeHtml(x.Status || "")}
      </td>
    </tr>
  `;
}).join("");
    }

    function updateSummary(rows) {
      const totalCount = rows.length;
      const totalAmount = rows.reduce((sum, x) => sum + Number(x.Amount || 0), 0);
      const creditCount = rows.filter(x => x.InvoiceType === "Credit Invoice").length;
      const reviewCount = rows.filter(x => x.Status === "ERROR").length;

      document.getElementById("totalCount").textContent = totalCount;
      document.getElementById("totalAmount").textContent = formatAmount(totalAmount);
      document.getElementById("creditCount").textContent = creditCount;
      document.getElementById("reviewCount").textContent = reviewCount;
    }

    function formatAmount(n) {
      if (!Number.isFinite(n)) return "";
      return n.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return String(value);
      return d.toISOString().slice(0, 10);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    loadInvoices();
  </script>
</body>
</html>
