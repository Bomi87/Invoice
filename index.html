<body>
  <div class="app">

      </div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-title">Total Invoices</div>

      </div>
      <div class="card">
        <div class="card-title">Needs Review</div>
        <div class="card-value" id="reviewCount">0</div>
      </div>
    </div>

<div class="filter">
  <input id="searchInput" placeholder="검색: Invoice No / Aircraft / Subject / Airport" oninput="renderTable()" />

  <div class="date-filter-row">
    <input id="dateFromFilter" type="date" onchange="renderTable()" title="조회 시작일" />
    <input id="dateToFilter" type="date" onchange="renderTable()" title="조회 종료일" />
 <button id="dateResetBtn" type="button" onclick="resetDateFilter()">Reset</button>
  </div>

  <select id="labelFilter" onchange="renderTable()">
    <option value="">전체 라벨</option>
  </select>

  <select id="typeFilter" onchange="renderTable()">
    <option value="">전체 Type</option>
    <option value="Invoice">Invoice</option>
    <option value="Credit Invoice">Credit Invoice</option>
    <option value="Credit Memo">Credit Memo</option>
    <option value="Credit Note">Credit Note</option>
  </select>

  <select id="statusFilter" onchange="renderTable()">
    <option value="">처리상태</option>
    <option value="UNSETTLED">미정산</option>
    <option value="SETTLED">정산완료</option>
    <option value="ERROR">ERROR</option>
  </select>
</div>

    <div class="status" id="status">대기 중</div>

    <div class="table-wrap">
      <table>
<thead>
  <tr>
    <th class="col-received">Received</th>
    <th class="col-label">Label</th>

<th class="col-invoice">Invoice No</th>
<th class="col-trip">Trip No</th>
<th class="col-date">Date</th>
<th class="col-due-date">Due Date</th>
<th class="col-aircraft">Aircraft</th>

<th class="col-pdf">PDF</th>

  <div class="modal-backdrop" id="detailModal" onclick="closeInvoiceDetail(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="detailTitle">Invoice Detail</div>
          <div class="modal-subtitle" id="detailSubtitle"></div>
        </div>
      <button class="modal-close" onclick="closeInvoiceDetail()" aria-label="Close">×</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzIJXT2fN4FzOKhdgMUlDGhROLp0i4a29gbBkSc03EIPO-40qO0-GOPNQRKCsXZTf4J7Q/exec";
    const API_TOKEN = "sk_invoice_2026_9xKp73Qw_invoice_check";

    let invoices = [];
    let currentRows = [];
    let isLoading = false;
    let isScanning = false;

    async function callApi(action, params) {
      const query = new URLSearchParams();

      query.set("token", API_TOKEN);
      query.set("action", action || "list");
      query.set("t", Date.now());

      if (params) {
        Object.keys(params).forEach(key => {
          query.set(key, params[key]);
        });
      }

      const url = APPS_SCRIPT_URL + "?" + query.toString();

      const res = await fetch(url, {
        method: "GET",
        cache: "no-store"
      });

      const data = await res.json();

      if (!data.ok) {
        throw new Error(data.error || "Apps Script error");
      }

      return data;
    }

    function setButtonsDisabled(disabled) {
      const refreshBtn = document.getElementById("refreshBtn");
      const scanBtn = document.getElementById("scanBtn");

      if (refreshBtn) refreshBtn.disabled = disabled;
      if (scanBtn) scanBtn.disabled = disabled;
    }

    async function loadInvoices() {
      if (isLoading || isScanning) return;

      isLoading = true;
      setButtonsDisabled(true);
      setStatus("Invoice 목록 불러오는 중...");

      try {
        const data = await callApi("list");
        invoices = data.invoices || [];
        sortInvoicesByDueDate();

        updateFilters();
        renderTable();

        setStatus("불러오기 완료: " + invoices.length + "건");

      } catch (err) {
        console.error(err);
        setStatus("오류: " + err.message);
      } finally {
        isLoading = false;
        setButtonsDisabled(false);
      }
    }
async function scanInvoices() {
  if (isScanning) return;

      const ok = confirm("Gmail 라벨의 PDF 첨부파일을 분석할까요?");
      if (!ok) return;

      isScanning = true;
      setButtonsDisabled(true);

      const scanBtn = document.getElementById("scanBtn");
      const oldText = scanBtn ? scanBtn.textContent : "";
      if (scanBtn) scanBtn.textContent = "분석 중...";

      setStatus("Gmail PDF 분석 중... 시간이 걸릴 수 있습니다.");

      try {
        const data = await callApi("scan");
        const r = data.result || {};

        setStatus(
          "분석 완료 / PDF: " + (r.totalPdf || 0) +
          " / 처리: " + (r.totalProcessed || 0) +
          " / 오류: " + (r.totalError || 0)
        );

        isScanning = false;
        setButtonsDisabled(false);
        if (scanBtn) scanBtn.textContent = oldText;

        await loadInvoices();

      } catch (err) {
        console.error(err);
        setStatus("오류: " + err.message);
      } finally {
        isScanning = false;
        setButtonsDisabled(false);
        if (scanBtn) scanBtn.textContent = oldText;
      }
    }

    function updateFilters() {
      const labelSet = new Set();

      invoices.forEach(x => {
        if (x.SourceLabel) labelSet.add(x.SourceLabel);
      });

      const labelFilter = document.getElementById("labelFilter");
      const current = labelFilter.value;

      labelFilter.innerHTML = '<option value="">전체 라벨</option>';

      Array.from(labelSet).sort().forEach(label => {
        const opt = document.createElement("option");
        opt.value = label;
        opt.textContent = label;
        labelFilter.appendChild(opt);
      });

      labelFilter.value = current;
    }

    function normalizeBadgeClass(value) {
  return String(value || "")
    .toLowerCase()
    .replace(/_/g, "-")
    .replace(/[^a-z0-9-]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

function labelBadge(label) {
  const raw = String(label || "").trim();
  if (!raw) return "";

  let text = raw;

  if (raw === "UAS_Invoice") text = "UAS";
  if (raw === "WFS_Invoice") text = "WFS";

  const cls = "label-" + normalizeBadgeClass(text);

  return '<span class="badge ' + cls + '">' + escapeHtml(text) + '</span>';
}

function categoryBadge(category) {
  const text = String(category || "").trim();
  if (!text) return "";

  const cls = "category-" + normalizeBadgeClass(text);

  return '<span class="badge ' + cls + '">' + escapeHtml(text) + '</span>';
}


function resetDateFilter() {
  const from = document.getElementById("dateFromFilter");
  const to = document.getElementById("dateToFilter");

  if (from) from.value = "";
  if (to) to.value = "";

  renderTable();
}
    
    function renderTable() {
      const tbody = document.getElementById("tbody");

   const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
const dateFrom = document.getElementById("dateFromFilter").value;
const dateTo = document.getElementById("dateToFilter").value;
const label = document.getElementById("labelFilter").value;
const type = document.getElementById("typeFilter").value;
const status = document.getElementById("statusFilter").value;

      let rows = invoices.slice();

rows = rows.filter(x => {
  if (label && x.SourceLabel !== label) return false;
  if (type && x.InvoiceType !== type) return false;

  if (!matchesInvoiceDateRange(x.InvoiceDate, dateFrom, dateTo)) {
    return false;
  }
     if (status) {
  const settled = isSettledInvoice(x);

  if (status === "UNSETTLED" && settled) return false;
  if (status === "SETTLED" && !settled) return false;
  if (status === "ERROR" && x.Status !== "ERROR") return false;
}

if (keyword) {
  const keywords = keyword
    .split(/[\s,]+/)
    .map(v => v.trim())
    .filter(Boolean);

  const blob = [
    x.SourceLabel,
    x.InvoiceNo,
    x.Registry,
    x.TripNo,
    x.Subject,
    x.Category,
    x.Airport,
    x.FileName,
    x.InvoiceType,
    x.Vendor,
    x.Currency
  ].join(" ").toLowerCase();

  const matchedAll = keywords.every(k => blob.includes(k));

  if (!matchedAll) return false;
}

        return true;
      });

      updateSummary(rows);
      currentRows = rows;

tbody.innerHTML = rows.map((x, rowIndex) => {
  const amount = Number(x.Amount || 0);
  const amountClass = amount < 0 ? "negative" : "positive";
  const settled = isSettledInvoice(x);

  const statusClass =

    x.Status === "ERROR" ? "status-error" :

  return `
    <tr title="Type: ${escapeHtml(x.InvoiceType || "")} / Trip: ${escapeHtml(x.TripNo || "")} / Currency: ${escapeHtml(x.Currency || "")} / Items: ${escapeHtml(x.ItemCount || "")}">

<td class="col-label" title="${escapeHtml(x.SourceLabel || "")}">

</td>
  

<td class="col-invoice" title="${escapeHtml(x.InvoiceNo || "")}">

</td>

</td>

<td class="col-due-date ${settled ? "settled-due" : dueDateClass}" title="${escapeHtml(x.DueDate || "")}">
  ${settled
    ? '<span class="settled-due-badge">정산완료</span>'
    : escapeHtml(x.DueDate || "")}
</td>

<td class="col-aircraft" title="${escapeHtml(x.Registry || "")}">
  <b>${escapeHtml(x.Registry || "")}</b>
</td>

      <td class="col-airport" title="${escapeHtml(x.Airport || "")}">
        ${escapeHtml(x.Airport || "")}
      </td>

  <td class="col-category" title="${escapeHtml(x.Category || "")}">
  ${categoryBadge(x.Category || "")}
</td>
      <td class="col-amount amount ${amountClass}" title="${formatAmount(amount)}">
        ${formatAmount(amount)}
      </td>

      <td class="col-detail">
        ${detailBtn}
      </td>

      <td class="col-pdf" title="${escapeHtml(x.FileName || "")}">
        ${x.PdfUrl
          ? '<a href="' + escapeHtml(x.PdfUrl) + '" target="_blank">' + escapeHtml(x.FileName || "PDF") + '</a>'
          : escapeHtml(x.FileName || "")}
      </td>


      <td class="col-status" title="${escapeHtml(x.Status || "")}">
        ${settled
          ? '<button class="settled-btn" onclick="markUnsettled(' + rowIndex + ')">완료</button>'
          : '<button class="settle-btn" onclick="markSettled(' + rowIndex + ')">미정산</button>'}
      </td>
    </tr>
  `;
}).join("");
    }

title.textContent = "Invoice Detail";

    function closeInvoiceDetail(event) {
      if (event && event.target && event.target.id !== "detailModal") return;
      document.getElementById("detailModal").classList.remove("show");
    }

    function parseItemsJson(value) {
      if (!value) return [];

      let parsed = [];

      if (Array.isArray(value)) {
        parsed = value;
      } else {
        try {
          const temp = JSON.parse(value);
          parsed = Array.isArray(temp) ? temp : [];
        } catch (err) {
          console.warn("ItemsJson parse failed", err);
          parsed = [];
        }
      }

      return normalizeDetailItems(parsed);
    }

    function normalizeDetailItems(items) {
      const result = [];

      (items || []).forEach((item, idx) => {
        const fixed = normalizeOneDetailItem(item, idx);
        fixed.forEach(x => result.push(x));
      });

      return result;
    }

    function normalizeOneDetailItem(item, idx) {
      const airport = String(item.airport || item.Airport || "").trim().toUpperCase();
      const description = String(item.description || item.Description || "").replace(/\s+/g, " ").trim();
      const unitPrice = String(item.unitPrice || item.unit_price || item.UnitPrice || "").trim();
      const qty = String(item.qty || item.quantity || item.Qty || "").trim();
      const amount = String(item.amount || item.Amount || "").trim();

      // 정상 item이면 그대로 표시
      if (airport && description && unitPrice && qty && amount && !looksLikeMergedUasDescription(description)) {
        return [{
          itemNo: item.itemNo || String(idx + 1),
          airport: airport,
          description: description,
          unitPrice: unitPrice,
          qty: qty,
          amount: amount
        }];
      }

      // 과거 파싱 결과처럼 description 한 칸에 여러 UAS row가 붙은 경우 프론트에서 한 번 더 분리
      const mergedText = [
        item.itemNo || String(idx + 1),
        item.country || "United States of America",
        airport,
        description,
        unitPrice,
        qty,
        amount
      ].join(" ").replace(/\s+/g, " ").trim();

      const split = splitMergedUasItems(mergedText);
      if (split.length > 0) return split;

      return [{
        itemNo: item.itemNo || String(idx + 1),
        airport: airport,
        description: description,
        unitPrice: unitPrice,
        qty: qty,
        amount: amount
      }];
    }

    function looksLikeMergedUasDescription(text) {
      const s = String(text || "");
      return /\s+\d+\s+[A-Za-z][A-Za-z\s,.'()\-]+\s+[A-Z]{4}\s+/.test(s);
    }

    function splitMergedUasItems(text) {
      const s = String(text || "").replace(/\s+/g, " ").trim();
      const out = [];

      const rowRegex = /(\d+)\s+([A-Za-z][A-Za-z\s,.'()\-]+?)\s+([A-Z]{4})\s+(.+?)\s+\$?\s*(-?[\d,]+(?:\.\d{1,5})?)\s+([\d,]+(?:\.\d+)?)\s+\$?\s*(-?[\d,]+\.\d{2})(?=\s+\d+\s+[A-Za-z][A-Za-z\s,.'()\-]+?\s+[A-Z]{4}\s+|$)/gi;

      let m;
      while ((m = rowRegex.exec(s)) !== null) {
        out.push({
          itemNo: m[1],
          country: m[2].trim(),
          airport: m[3].trim().toUpperCase(),
          description: m[4].trim(),
          unitPrice: m[5].replace(/,/g, ""),
          qty: m[6].replace(/,/g, ""),
          amount: m[7].replace(/,/g, "")
        });
      }

      return out;
    }

    function formatMoneyText(value) {
      if (value === null || value === undefined || value === "") return "";

      const raw = String(value).replace(/[$,]/g, "").trim();
      const n = Number(raw);

      if (!Number.isFinite(n)) return escapeHtml(String(value));

      return formatAmount(n);
    }

    async function markSettled(rowIndex) {
      const x = currentRows[rowIndex];
      if (!x) return;

      const ok = confirm("이 invoice를 정산완료 처리할까요?");
      if (!ok) return;

      try {
        setStatus("정산완료 처리 중...");

        await callApi("settle", {
          invoiceNo: x.InvoiceNo || "",
          fileName: x.FileName || ""
        });

        x.Status = "정산완료";

        invoices.forEach(item => {
          if (
            String(item.InvoiceNo || "") === String(x.InvoiceNo || "") ||
            String(item.FileName || "") === String(x.FileName || "")
          ) {
            item.Status = "정산완료";
          }
        });

     sortInvoicesByDueDate();
renderTable();
setStatus("정산완료 처리됨: " + (x.InvoiceNo || x.FileName || ""));

      } catch (err) {
        console.error(err);
        setStatus("정산완료 처리 오류: " + err.message);
      }
    }


    async function markUnsettled(rowIndex) {
      const x = currentRows[rowIndex];
      if (!x) return;

      const ok = confirm("이 invoice의 정산완료 처리를 취소할까요?");
      if (!ok) return;

      try {
        setStatus("정산완료 취소 중...");

        await callApi("unsettle", {
          invoiceNo: x.InvoiceNo || "",
          fileName: x.FileName || ""
        });

        x.Status = "OK";

        invoices.forEach(item => {
          if (
            String(item.InvoiceNo || "") === String(x.InvoiceNo || "") ||
            String(item.FileName || "") === String(x.FileName || "")
          ) {
            item.Status = "OK";
          }
        });

   sortInvoicesByDueDate();
renderTable();
setStatus("정산완료 취소됨: " + (x.InvoiceNo || x.FileName || ""));

      } catch (err) {
        console.error(err);
        setStatus("정산완료 취소 오류: " + err.message);
      }
    }

    function isSettledInvoice(x) {
      const status = String(x.Status || "").toUpperCase();

      return (
        status.includes("정산완료") ||
        status.includes("PAID") ||
        status.includes("SETTLED") ||
        status.includes("DONE")
      );
    }

    function isDueWithinDays(value, days) {
      const due = parseInvoiceDateValue(value);
      if (!due) return false;

      const now = new Date();
      now.setHours(0, 0, 0, 0);

      due.setHours(0, 0, 0, 0);

      const diffDays = Math.ceil((due.getTime() - now.getTime()) / (1000 * 60 * 60 * 24));

      return diffDays >= 0 && diffDays <= days;
    }

function sortInvoicesByDueDate() {
  invoices.sort((a, b) => {
    const aSettled = isSettledInvoice(a);
    const bSettled = isSettledInvoice(b);

    // 1순위: 미정산 먼저, 정산완료는 아래로
    if (aSettled !== bSettled) {
      return aSettled ? 1 : -1;
    }

    // 2순위: 같은 정산 상태끼리는 Due Date 최신순
    const da = parseInvoiceDateValue(a.DueDate);
    const db = parseInvoiceDateValue(b.DueDate);

    const ta = da ? da.getTime() : 0;
    const tb = db ? db.getTime() : 0;

    return tb - ta;
  });
}

    function parseDueDateForSort(value) {
      const d = parseInvoiceDateValue(value);
      return d ? d.getTime() : 0;
    }

    function matchesInvoiceDateRange(invoiceDateText, filterFrom, filterTo) {
  if (!filterFrom && !filterTo) return true;

  const invoiceRange = parseInvoiceDateRange(invoiceDateText);
  if (!invoiceRange) return false;

  const fromDate = filterFrom ? parseDateInputValue(filterFrom) : null;
  const toDate = filterTo ? parseDateInputValue(filterTo) : null;

  const filterStart = fromDate || toDate;
  const filterEnd = toDate || fromDate;

  if (!filterStart || !filterEnd) return true;

  invoiceRange.start.setHours(0, 0, 0, 0);
  invoiceRange.end.setHours(0, 0, 0, 0);
  filterStart.setHours(0, 0, 0, 0);
  filterEnd.setHours(0, 0, 0, 0);

  // 날짜 범위가 겹치면 true
  return invoiceRange.start <= filterEnd && invoiceRange.end >= filterStart;
}


function parseInvoiceDateRange(value) {
  if (!value) return null;

  const text = String(value).trim();

  // 예: 25 Mar 2026 - 29 Mar 2026
  // 예: 25 Mar 2026 ~ 29 Mar 2026
  let parts = text.split(/\s*(?:-|~|–|—)\s*/);

  // 주의: 12-APR-2026 같은 날짜도 "-"로 split되므로, 먼저 range 형태인지 확인
  if (/\d{1,2}\s+[A-Za-z]{3}\s+\d{4}\s*(?:-|~|–|—)\s*\d{1,2}\s+[A-Za-z]{3}\s+\d{4}/i.test(text)) {
    const rangeParts = text.split(/\s*(?:-|~|–|—)\s*/);
    const start = parseInvoiceDateValue(rangeParts[0]);
    const end = parseInvoiceDateValue(rangeParts[1]);

    if (start && end) {
      return start <= end
        ? { start: start, end: end }
        : { start: end, end: start };
    }
  }

  // 예: 12-APR-2026
  // 예: 30-APR-2026
  // 예: 2026-05-16
  const single = parseInvoiceDateValue(text);
  if (single) {
    return {
      start: single,
      end: single
    };
  }

  return null;
}


function parseDateInputValue(value) {
  if (!value) return null;

  const m = String(value).match(/^([0-9]{4})-([0-9]{2})-([0-9]{2})$/);
  if (!m) return null;

  return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
}
    function parseInvoiceDateValue(value) {
      if (!value) return null;

      const text = String(value).trim();

      // 10-JUN-2026
      let m = text.match(/^([0-9]{1,2})[-\s]([A-Za-z]{3})[-\s]([0-9]{4})$/);
      if (m) {
        return new Date(Number(m[3]), monthIndex(m[2]), Number(m[1]));
      }

      // 25 Mar 2026
m = text.match(/^([0-9]{1,2})\s+([A-Za-z]{3})\s+([0-9]{4})$/);
if (m) {
  return new Date(Number(m[3]), monthIndex(m[2]), Number(m[1]));
}

      // 2026-06-10
      m = text.match(/^([0-9]{4})-([0-9]{1,2})-([0-9]{1,2})$/);
      if (m) {
        return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
      }

      const d = new Date(text);
      if (!isNaN(d.getTime())) return d;

      return null;
    }

    function monthIndex(mmm) {
      const months = {
        JAN: 0,
        FEB: 1,
        MAR: 2,
        APR: 3,
        MAY: 4,
        JUN: 5,
        JUL: 6,
        AUG: 7,
        SEP: 8,
        OCT: 9,
        NOV: 10,
        DEC: 11
      };

      return months[String(mmm || "").toUpperCase()] ?? 0;
    }

function isCreditInvoice(row) {
  const invoiceType = String(row.InvoiceType || "").toUpperCase();
  const dueDate = String(row.DueDate || "").toUpperCase();
  const invoiceNo = String(row.InvoiceNo || "").toUpperCase();
  const fileName = String(row.FileName || "").toUpperCase();
  const amount = Number(String(row.Amount || "0").replace(/,/g, ""));

  return (
    invoiceType.includes("CREDIT") ||
    dueDate.includes("CREDIT NOTE") ||
    invoiceNo.startsWith("CRN") ||
    fileName.startsWith("CRN") ||
    amount < 0
  );
}
    
function updateSummary(rows) {
  const totalCount = rows.length;

  const totalAmount = rows.reduce((sum, x) => {
    const amount = Number(String(x.Amount || "0").replace(/,/g, ""));
    return sum + (Number.isFinite(amount) ? amount : 0);
  }, 0);

  const creditCount = rows.filter(isCreditInvoice).length;
  const reviewCount = rows.filter(x => x.Status === "ERROR").length;

  document.getElementById("totalCount").textContent = totalCount;
  document.getElementById("totalAmount").textContent = formatAmount(totalAmount);
  document.getElementById("creditCount").textContent = creditCount;
  document.getElementById("reviewCount").textContent = reviewCount;
}
    function formatAmount(n) {
      if (!Number.isFinite(n)) return "";
      return n.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }
function formatDetailServiceDate(value) {
  const text = String(value || "").trim();
  if (!text) return "";

  // 예: 05 Apr 2026 - 16 Apr 2026
  const rangeMatch = text.match(
    /^([0-9]{1,2})\s+([A-Za-z]{3})\s+([0-9]{4})\s*[-~–—]\s*([0-9]{1,2})\s+([A-Za-z]{3})\s+([0-9]{4})$/i
  );

  if (rangeMatch) {
    const start =
      String(rangeMatch[1]).padStart(2, "0") +
      rangeMatch[2].toUpperCase() +
      " " +
      rangeMatch[3];

    const end =
      String(rangeMatch[4]).padStart(2, "0") +
      rangeMatch[5].toUpperCase() +
      " " +
      rangeMatch[6];

    return escapeHtml(start) + " ~<br>" + escapeHtml(end);
  }

  // 예: 12-APR-2026
  const singleDash = text.match(/^([0-9]{1,2})-([A-Za-z]{3})-([0-9]{4})$/i);
  if (singleDash) {
    return escapeHtml(
      String(singleDash[1]).padStart(2, "0") +
      singleDash[2].toUpperCase() +
      " " +
      singleDash[3]
    );
  }

  return escapeHtml(text);
}
    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return String(value);
      return d.toISOString().slice(0, 10);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape") closeInvoiceDetail();
    });

window.addEventListener("DOMContentLoaded", function () {
  document.getElementById("refreshBtn").addEventListener("click", loadInvoices);
  document.getElementById("scanBtn").addEventListener("click", scanInvoices);

  loadInvoices();
});
